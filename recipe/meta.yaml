{% set version = "2.1.5" %}
{% set gdalversion = "3.12.0" %}

package:
  name: gdal-csharp
  version: {{ version }}

source:
 url: http://download.osgeo.org/gdal/{{ gdalversion }}/gdal-{{ gdalversion }}.tar.xz
 sha256: 44c95baabe6c1a047c1ebe5043e38dd73e4936bc4c481db14efbfd03342eab73
 
build:
  number: 0

requirements:
  build:
    - cmake
    - pkg-config >=0.21  # [not win]
    - make  # [not win]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - swig
    - bison  # [not win]
  host:
    - libgdal
  run:
    - libgdal
    - dotnet

test:
  files:
   - test.sh
  source_files:
   - swig/csharp/apps/GDALTest.cs


about:
  home: http://www.gdal.org
  license: MIT
  license_file: LICENSE.TXT
  summary: |
    GDAL is a translator library for raster and vector geospatial data formats that is released under an
    X/MIT style Open Source license by the Open Source Geospatial Foundation.
    This package provides the C# and Unity interface to the library.

extra:
  recipe-maintainers:
    - runette
    - bjornharrtell
